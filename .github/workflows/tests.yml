name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env.local
        run: |
          echo "SOLR_USER=${{ secrets.SOLR_USER }}" > .env.local
          echo "SOLR_PASS=${{ secrets.SOLR_PASS }}" >> .env.local
          echo "SOLR_JOBS_CORE=${{ secrets.SOLR_JOBS_CORE }}" >> .env.local
          echo "SOLR_COMPANY_CORE=${{ secrets.SOLR_COMPANY_CORE }}" >> .env.local

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python -m pytest tests/
